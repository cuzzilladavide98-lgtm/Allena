<script>
"use strict";
// ============================================================
// MOTORE — funzioni pure (validate con suite Node: 41/41)
// ============================================================
function epley1RM(weight, reps){ if(!weight||!reps||weight<=0||reps<=0)return 0; if(reps===1)return round1(weight); return round1(weight*(1+reps/30)); }
function brzycki1RM(weight, reps){ if(!weight||!reps||weight<=0||reps<=0)return 0; if(reps===1)return round1(weight); if(reps>=37)return null; return round1(weight*36/(37-reps)); }
function estimate1RM(weight, reps){ return epley1RM(weight, reps); } // Epley puro come primaria, verificabile
function round1(x){ return Math.round(x*10)/10; }
function round2(x){ return Math.round(x*100)/100; }

const EPS = 1e-6;
function decomposePlates(target, plates){
  let remaining = Math.max(0, target); const used = [];
  const sorted = [...plates].sort((a,b)=>b-a);
  for(const p of sorted){ if(p<=0)continue; let count=0; while(remaining+EPS>=p){ remaining-=p; count++; } if(count>0)used.push({plate:p,count}); }
  const achieved = target - Math.max(0, remaining);
  return { used, achieved: round2(achieved), remainder: round2(Math.max(0, remaining)) };
}
function calcPlates(targetWeight, barWeight, plates, mode){
  if(mode==='bilanciere'){
    if(targetWeight<=barWeight+EPS) return { mode, barWeight, perSide:[], achievedTotal:barWeight, achievable:true, note:'bilanciere scarico' };
    const perSideTarget = (targetWeight-barWeight)/2;
    const { used, achieved, remainder } = decomposePlates(perSideTarget, plates);
    return { mode, barWeight, perSide:used, achievedTotal:round2(barWeight+achieved*2), achievable: remainder<EPS };
  }
  const { used, achieved, remainder } = decomposePlates(targetWeight, plates);
  return { mode, barWeight:0, perSide:used, achievedTotal:achieved, achievable: remainder<EPS };
}
function platesToText(calc){
  if(!calc.perSide.length) return calc.mode==='bilanciere' ? `Solo bilanciere (${calc.barWeight}kg)` : 'Nessun disco';
  const parts = calc.perSide.map(p=>`${p.count}×${formatKg(p.plate)}`).join(' + ');
  return calc.mode==='bilanciere' ? `${parts} per lato · tot ${formatKg(calc.achievedTotal)}kg` : `${parts} · tot ${formatKg(calc.achievedTotal)}kg`;
}
function formatKg(x){ return Number.isInteger(x) ? String(x) : x.toFixed(2).replace(/0+$/,'').replace(/\.$/,''); }

function adaptiveRestSeconds(baseRest, rpe){
  const base = baseRest&&baseRest>0 ? baseRest : 90;
  if(rpe==null||rpe===0) return base;
  let mult; if(rpe<=6)mult=0.75; else if(rpe<=8)mult=1.0; else if(rpe===9)mult=1.25; else mult=1.5;
  return Math.min(300, Math.max(20, Math.round(base*mult)));
}

function estimatePerformance(weight, reps){ if(weight&&weight>0)return estimate1RM(weight,reps); return reps||0; }
function bestSetOfSession(item){
  let bestPerf=-Infinity, bestSet=null;
  for(const st of item.sets||[]){ const perf=estimatePerformance(st.w||0, st.r||0); if(perf>bestPerf){bestPerf=perf; bestSet=st;} }
  return bestSet ? { perf:bestPerf, weighted:(bestSet.w||0)>0, set:bestSet } : null;
}
function analyzeDeload(sessions, exerciseId){
  const occ=[];
  for(const s of sessions){ const it=(s.items||[]).find(i=>i.id===exerciseId); if(!it)continue; const best=bestSetOfSession(it); if(best)occ.push({date:s.date, perf:best.perf, weighted:best.weighted}); }
  occ.sort((a,b)=>a.date.localeCompare(b.date));
  if(occ.length<4) return { suggested:false, reason:'storico insufficiente', n:occ.length };
  const lastMode = occ[occ.length-1].weighted;
  const seq = occ.filter(o=>o.weighted===lastMode);
  if(seq.length<4) return { suggested:false, reason:'storico insufficiente nella modalità corrente', n:seq.length };
  const last4 = seq.slice(-4); const drops=[];
  for(let i=1;i<last4.length;i++){ const prev=last4[i-1].perf, curr=last4[i].perf; drops.push(round1((prev>0?(prev-curr)/prev:0)*100)); }
  return { suggested: drops.every(d=>d>5), drops, window:last4 };
}
function analyzeDeloadAll(sessions, exerciseIds){
  const triggered=[];
  for(const id of exerciseIds){ const r=analyzeDeload(sessions, id); if(r.suggested)triggered.push({id, ...r}); }
  return { suggested: triggered.length>0, triggered };
}
function applyDeloadToTarget(targetWeight, targetReps){
  if(targetWeight&&targetWeight>0) return { targetWeight:round1(targetWeight*0.6), targetReps };
  return { targetWeight:0, targetReps:Math.max(1, Math.round(targetReps*0.6)) };
}
function sessionVolume(session){
  let v=0; for(const it of session.items||[]){ for(const st of it.sets||[]){ v+=(st.w||0)*(st.r||0); } } return round1(v);
}
</script>

nsione":"Bassa, gamba d'appoggio salda","descrizione":"La verticale del bacino non oscilla: si muove solo il femore.","fasi":[["Posizione iniziale","In piedi su una gamba, eventuale appoggio leggero con una mano, busto verticale, core attivo."],["Oscillazione","Oscilla la gamba libera dall'anca, ampiezza progressiva, senza compensare con il busto."],["Punto critico","Massima ampiezza: bacino fermo, evita l'iperlordosi nello slancio indietro."],["Chiusura","Rallenta e torna in piedi in controllo. Variante: oscillazioni medio-laterali."]],"errori":[["Busto che oscilla con la gamba","Fissa lo sterno e muovi solo dall'anca."],["Iperlordosi nello slancio indietro","Limita l'estensione, bacino in leggera retroversione."],["Gamba d'appoggio rigida e bloccata","Tieni un micro-piega al ginocchio per stabilità."]]},"jump-squat":{"ritmo":"Contro-movimento breve e veloce, esplosivo","respiro":"Inspira prima, breve apnea nell'esplosione","tensione":"Massimale e breve","descrizione":"Caricamento (ombra) poi estensione completa in volo. Ginocchio sopra la punta in ogni frame.","fasi":[["Caricamento (eccentrica)","Contro-movimento rapido: fletti anca, ginocchio e caviglia in un quarto/mezzo squat, busto inclinato, braccia indietro."],["Punto critico","Transizione bassa: inverti rapidamente (ciclo allungamento-accorciamento) per massimizzare la forza."],["Concentrica / volo","Triplice estensione esplosiva di anca, ginocchio e caviglia; braccia che slanciano in alto; decollo."],["Atterraggio","Ricevi sull'avampiede e ammortizza flettendo anca, ginocchio e caviglia; ginocchia allineate alle punte."]],"errori":[["Atterraggio rumoroso e rigido","Atterra 'come un ninja': ammortizza e ricevi sull'avampiede."],["Valgo di ginocchio in spinta o atterraggio","Guida le ginocchia verso le punte e attiva i glutei."],["Profondità eccessiva che rallenta il rimbalzo","Usa un contro-movimento breve e veloce, non uno squat completo."]]},"wall-handstand":{"ritmo":"Tenute 20–40 s","respiro":"Corta e costante, mai apnea lunga","tensione":"Alta, corpo come 'una linea'","descrizione":"Corpo capovolto: una sola verticale polso-spalla-bacino-caviglia. In rosso l'errore 'a banana'; la freccia indica la spinta sul pavimento.","fasi":[["Posizione iniziale","Mani a terra a ~larghezza spalle, dita aperte e attive; piedi verso il muro o kick-up controllato."],["Salita","Porta i piedi sul muro camminando indietro con le mani o con un calcio a salire controllato fino alla verticale."],["Tenuta (punto critico)","Allineamento polsi-spalle-bacino-caviglie a piombo; spalle elevate, costato chiuso, bacino in retroversione, glutei e addome attivi."],["Discesa","Cammina giù con le mani o riporta una gamba alla volta, in controllo."]],"errori":[["Schiena inarcata a banana","Retroverti il bacino, chiudi il costato, attiva addome e glutei."],["Spalle affondate verso le orecchie","Spingi il pavimento ed eleva le scapole."],["Cadute per polsi deboli","Rinforza polsi e avambracci, distribuisci il peso fino ai polpastrelli."]]},"pike-pushup":{"ritmo":"2-1-1","respiro":"Inspira in discesa, espira in spinta","tensione":"Alta sulle spalle","descrizione":"Triangolo mani-testa: la testa scende davanti alle mani, anche alte, busto quasi verticale.","fasi":[["Posizione iniziale","V rovesciata (pike): mani e piedi a terra, anche alte, gambe e braccia quasi tese, busto vicino alla verticale."],["Eccentrica","Fletti i gomiti abbassando la testa in avanti verso un punto davanti alle mani (traiettoria a triangolo), gomiti a ~45°."],["Punto critico","Testa vicino al suolo davanti alle mani: massimo carico su deltoidi e tricipiti."],["Concentrica","Spingi tornando alla posizione a V, estendendo i gomiti. Anche alte, scapole che ruotano verso l'alto."]],"errori":[["Anche che calano (push-up inclinato)","Mantieni le anche alte e avvicina i piedi alle mani per verticalizzare."],["Testa che scende dietro o sopra le mani","Punta a un bersaglio davanti alle mani, traiettoria a triangolo."],["Gomiti che si allargano a 90°","Tienili a ~45° dal tronco."]]},"archer-pushup":{"ritmo":"3-1-1 controllato","respiro":"Inspira in discesa, espira in spinta","tensione":"Alta, forte anti-rotazione","descrizione":"Push-up a mani larghe visto da dietro: il petto scende verso una mano (gomito flesso), l'altro braccio resta teso lateralmente. Anche quadrate.","fasi":[["Posizione iniziale","Push-up con mani molto più larghe delle spalle, corpo rigido, scapole protratte."],["Eccentrica","Piega un gomito spostando peso e petto verso quella mano; l'altro braccio resta teso e scivola lateralmente, palmo a terra."],["Punto critico","Petto vicino alla mano lavorante, braccio opposto completamente esteso: forte richiesta unilaterale e di anti-rotazione."],["Concentrica / alternanza","Spingi con il braccio flesso per tornare al centro. Ripeti dal lato opposto con anche 'quadrate'."]],"errori":[["Bacino che ruota verso il braccio teso","Tieni le anche quadrate e contrai il gluteo del lato opposto."],["Braccio esteso che aiuta a spingere","Mantienilo passivo e teso: il peso deve stare sul braccio che lavora."],["Petto che non scende vicino alla mano","Aumenta il range e controlla l'eccentrica."]]},"inverted-row":{"ritmo":"1-1-2 (eccentrica controllata)","respiro":"Espira tirando, inspira scendendo","tensione":"Alta, corpo a plancia","descrizione":"Corpo rigido caviglia-anca-spalla. La scapola si retrae per prima, poi il gomito tira lo sterno alla barra.","fasi":[["Posizione iniziale","Supino sotto una barra o un tavolo robusto, presa poco più larga delle spalle, corpo teso dai talloni alle spalle, braccia estese."],["Concentrica (tirata)","Inizia retraendo le scapole, poi tira i gomiti verso il fianco portando lo sterno alla barra."],["Punto critico","Petto vicino alla barra, massima retrazione scapolare: picco per dorso e bicipiti."],["Eccentrica","Abbassa in controllo fino all'estensione completa delle braccia e alla protrazione scapolare. Corpo sempre rigido."]],"errori":[["Bacino che si abbassa","Contrai glutei e addome: il corpo deve restare un'asse rigida."],["Tirare solo con le braccia","Inizia dalla retrazione scapolare, poi conduci con i gomiti."],["Mezzo range (petto lontano dalla barra)","Tira finché lo sterno tocca e controlla la discesa."]]},"pistol-squat":{"ritmo":"3 s di eccentrica, breve pausa, risalita controllata","respiro":"Inspira giù, espira su","tensione":"Alta, forte componente di equilibrio","descrizione":"Fondo: tallone a terra (dorsiflessione), ginocchio sopra la punta, busto inclinato ma colonna neutra. Gamba libera tesa avanti.","fasi":[["Posizione iniziale","In piedi su una gamba, l'altra tesa in avanti e sollevata, braccia avanti come contrappeso, colonna neutra."],["Eccentrica","Fletti anca, ginocchio e caviglia della gamba d'appoggio scendendo lento; il busto si inclina avanti per tenere il baricentro sul piede."],["Punto critico","Massima profondità (gluteo vicino al tallone): caviglia in forte dorsiflessione, ginocchio oltre la punta ma in traccia, tallone a terra."],["Concentrica","Spingi con tallone e medio-piede risalendo, estendendo anca e ginocchio senza valgo."]],"errori":[["Tallone che si solleva","Migliora la dorsiflessione; in apprendimento usa un piccolo rialzo sotto il tallone."],["Ginocchio che collassa all'interno","Guida il ginocchio verso il 2°-3° dito e attiva il gluteo medio."],["Arrotondamento lombare in basso (butt wink)","Ferma il range dove la schiena resta neutra e rinforza il controllo."]]},"nordic-curl":{"ritmo":"Eccentrica 3–5 s, massimo controllo","respiro":"Controlla/espira in discesa","tensione":"Massimale in eccentrica","descrizione":"Segmento unico ginocchia-anca-spalle che resta dritto in ogni frame (verticale → ~45°). L'anca NON si flette.","fasi":[["Posizione iniziale","In ginocchio su superficie morbida, caviglie bloccate, corpo eretto in linea ginocchia-anca-spalle, anca estesa."],["Eccentrica","Abbassa il busto in avanti il più lento possibile resistendo con i femorali, corpo come un segmento unico rigido (l'anca NON si flette)."],["Punto critico","Zona a ~30-45° dal suolo, dove la leva è massima e i femorali cedono: qui evita di 'rompere' all'anca."],["Concentrica","Quando non riesci più a frenare, ammortizza con le mani a terra e aiutati con le braccia a risalire."]],"errori":[["Flettere l'anca per scendere (sedere indietro)","Mantieni glutei contratti e anca estesa: corpo in linea retta."],["Caduta rapida non controllata","Rallenta, riduci il range iniziale, usa una banda elastica come assistenza."],["Iperestensione lombare","Chiudi il costato e tieni una leggera retroversione del bacino."]]},"dragon-flag":{"ritmo":"Eccentrica 3–4 s","respiro":"Espira in risalita, controllo costante","tensione":"Massimale del core","descrizione":"Sdraiato sulla panca, appoggio solo sulle scapole: corpo rigido in linea che sale e scende come un blocco. Niente inarco lombare.","fasi":[["Posizione iniziale","Supino su una panca, mani che afferrano un appoggio dietro la testa; corpo sollevato in appoggio solo sulle scapole."],["Eccentrica","Abbassa lentamente il corpo, un unico segmento rigido dalle spalle ai piedi, verso il suolo senza toccare, resistendo con l'addome."],["Punto critico","Corpo quasi parallelo al suolo, leva massima: rischio di inarcare la zona lombare."],["Concentrica","Risali riportando il corpo verso la verticale, sempre rigido. Le scapole restano l'unico punto d'appoggio."]],"errori":[["Zona lombare che si inarca","Chiudi il costato, premi la regione lombare 'verso dentro', riduci il range."],["Piegare le anche per facilitare","Mantieni il corpo come un'asse unica; regredisci a ginocchia piegate se serve."],["Discesa a scatti","Controlla l'eccentrica e rallenta."]]},"side-plank":{"ritmo":"Tenute 20–40 s o ripetizioni lente","respiro":"Regolare","tensione":"Alta, isometrica","descrizione":"Gomito esattamente sotto la spalla. Linea retta caviglia-anca-spalla, anca alta, niente rotazione del tronco.","fasi":[["Posizione iniziale","Su un fianco, gomito sotto la spalla, avambraccio a terra, corpo in linea, piedi sovrapposti o sfalsati."],["Tenuta","Solleva l'anca finché il corpo è una linea retta caviglie-anca-spalla; anca alta, glutei attivi."],["Variante Copenhagen","Gamba superiore appoggiata con la parte interna su una panca, gamba inferiore sospesa; solleva il bacino spingendo con gli adduttori."],["Punto critico","Mantenere l'anca alta senza ruotare il tronco né lasciar cadere il bacino."]],"errori":[["Anca che cala","Solleva il bacino, contrai glutei e obliqui, tieni l'anca alta."],["Rotazione del tronco","Impila spalle e anche, sguardo avanti, core attivo."],["Spalla d'appoggio che affonda","Spingi il pavimento e attiva il gran dentato."]]},"hollow-hold":{"ritmo":"Tenuta 15–30 s","respiro":"Corta e costante, addome attivo","tensione":"Alta, isometrica","descrizione":"Zona lombare premuta a terra (linea), spalle e gambe sollevate di pochi gradi: 'banana' poco profonda.","fasi":[["Posizione iniziale","Supino, braccia oltre la testa, gambe tese; premi la zona lombare contro il pavimento (retroversione del bacino)."],["Tenuta","Solleva insieme spalle (scapole appena staccate) e gambe, mantenendo la lombare SEMPRE a contatto col suolo; corpo a 'banana' poco profonda."],["Punto critico","Gambe basse e braccia distese aumentano la leva: se la lombare si stacca, la posizione è persa."],["Regola la leva","Piega le ginocchia o avvicina le braccia per ridurre la leva; estendi tutto per aumentarla."]],"errori":[["Spazio sotto la zona lombare","Premi la schiena a terra e riduci la leva (gambe più alte o ginocchia piegate)."],["Tensione sul collo","Sguardo verso l'alto, solleva dallo sterno e non dal mento."],["Apnea","Respira in modo corto e costante mantenendo l'addome attivo."]]},"burpee":{"ritmo":"Condizionante e continuo, plank rigido e atterraggio controllato","respiro":"Espira nello sforzo, ritmo costante","tensione":"Media, variabile per fase","descrizione":"Sequenza squat → plank → push-up → salto. Nel plank, retta caviglia-anca-spalla; nel salto estensione completa.","fasi":[["Fase 1 — Squat down","Dalla stazione eretta, fletti anca e ginocchio e appoggia le mani a terra davanti ai piedi."],["Fase 2 — Kick-back in plank","Spingi o salta i piedi indietro fino a un plank rigido (corpo in linea, niente bacino cadente)."],["Fase 3 — Push-up (opzionale)","Un piegamento completo mantenendo la linea del corpo."],["Fase 4 — Tuck e jump","Riporta i piedi sotto le anche e salta in verticale con triplice estensione e braccia in alto. Atterra ammortizzato."]],"errori":[["Bacino che crolla nel passaggio a plank","Atterra in plank rigido con glutei e addome attivi."],["Schiena arrotondata nel raccogliere i piedi","Fletti dalle anche tenendo il petto alto."],["Atterraggio rigido del salto","Ricevi sull'avampiede e ammortizza."]]},"loaded-carry":{"ritmo":"Percorsi di 30–50 passi o a tempo","respiro":"Regolare","tensione":"Alta e costante su core e presa","descrizione":"Spalle e bacino orizzontali e paralleli, colonna verticale: il busto NON si inclina verso il peso.","fasi":[["Posizione iniziale","In piedi, un peso (max 10 kg) in una mano (suitcase) o stretto al petto (bear-hug); colonna neutra, spalle basse e indietro."],["Marcia","Cammina con passi corti e controllati mantenendo il busto perfettamente verticale; nel suitcase resisti all'inclinazione laterale verso il peso."],["Punto critico","Ogni passo sfida la stabilità di bacino e core: non lasciare che la spalla del lato carico si abbassi."],["Chiusura","Alterna la mano per bilanciare il lavoro. Deponi il peso con un hip hinge corretto."]],"errori":[["Inclinazione laterale verso il peso","Mantieni le spalle livellate, contrai il core del lato opposto, 'cammina alto'."],["Spalla che si arrotonda in avanti","Spalla bassa e indietro, scapola attiva."],["Presa che cede","Stringi forte con l'avambraccio attivo; riduci il peso se la tecnica cala."]]},"rematore-zaino":{"ritmo":"1-1-2 (eccentrica controllata)","respiro":"Espira tirando, inspira scendendo","tensione":"Alta, schiena isometrica","descrizione":"Hip hinge: schiena neutra (linea bacino-colonna-testa) che NON cambia angolo, tibie verticali. Scapola e gomito conducono la tirata.","fasi":[["Posizione iniziale","In piedi, zaino (max 10 kg) afferrato per bretelle o maniglia; esegui un hip hinge (anca indietro, schiena neutra, tibie quasi verticali) fino a busto ~45° o più."],["Concentrica (tirata)","Inizia retraendo le scapole, poi tira i gomiti verso l'alto/indietro lungo i fianchi portando lo zaino verso l'addome."],["Punto critico","Massima retrazione scapolare; il gomito non supera troppo la linea del corpo."],["Eccentrica","Abbassa lo zaino in controllo fino all'estensione completa, scapole che si 'aprono'. Schiena neutra per tutta la serie."]],"errori":[["Schiena arrotondata","Imposta l'hinge con schiena neutra e core attivo prima di tirare; riduci il carico."],["Busto che si solleva per dare slancio","Mantieni fisso l'angolo del busto, niente kipping."],["Tirare solo con le braccia","Inizia dalla retrazione scapolare e conduci con il gomito."]]}},"tappe":[{"n":1,"key":"upper","nome":"Forza Upper","sub":"Spinta + Trazione","kind":"struttura","mode":"forza"},{"n":2,"key":"lower","nome":"Forza Lower","sub":"Hinge + Ginocchio","kind":"struttura","mode":"forza"},{"n":3,"key":"sled","nome":"Sled Motore","sub":"Locomozione caricata","kind":"struttura","mode":"forza"},{"n":4,"key":"corsa","nome":"Corsa Zona 2","sub":"Condizionamento","kind":"jolly","mode":""},{"n":5,"key":"cyclette","nome":"Cyclette","sub":"Cardio basso impatto","kind":"jolly","mode":""},{"n":6,"key":"kettlebell","nome":"Kettlebell","sub":"Coordinazione balistica","kind":"jolly","mode":"forza"},{"n":7,"key":"recupero","nome":"Recupero","sub":"Rigenerazione","kind":"jolly","mode":""}],"protocollo0":{"nome":"Protocollo 0 - Reset","sub":"Postura / Equilibrio","ex":["breath90","deadbug","glutebridge","hipflexor","slbalance","tibialis"]},"manuale":{"descrizione":"17 esercizi del Manuale Tecnico, in 4 blocchi. tipo: dynamic/reps/hold/carry. work=secondi (o durata tenuta), rest=recupero sec.","blocchi":[{"n":1,"nome":"Blocco 1 · Riscaldamento","desc":"Attivazione, mobilità e coordinazione"},{"n":2,"nome":"Blocco 2 · Potenza & Skill","desc":"Esplosività e controllo isometrico"},{"n":3,"nome":"Blocco 3 · Forza","desc":"Spinte, trazioni, gambe e core"},{"n":4,"nome":"Blocco 4 · Condizionamento","desc":"Full-body e trasporti"}]}};

// ============================================================
// APP — state, router, views
// ============================================================
const LS_KEY = 'aureo_workout_v1';
const $ = (id) => document.getElementById(id);

// -------- State --------
function defaultState(){
  return {
    exercises: SEED_DATA.exercises,      // dict id -> exercise (catalogo, statico)
    routines: SEED_DATA.routines,        // array (statico)
    sessions: JSON.parse(JSON.stringify(SEED_DATA.sessions)), // storico, mutabile
    measurements: SEED_DATA.measurements || [],
    config: { barWeight: 20, plates: [20,15,10,5,2.5,1.25], step: 2.5 },
    active: null,   // sessione in corso (bozza)
    weightInput: null, // valore transitorio stepper peso corporeo (non persistito)
    view: 'allena',
    // --- stati runtime (non persistiti) ---
    picker: false, pickerQ: '',        // overlay aggiungi-esercizio
    expandedSession: null,             // dettaglio sessione nello storico
    expandedRecord: null,              // progressione esercizio nei record
    summary: null,                     // riepilogo fine sessione
    saveError: false,                  // salvataggio localStorage fallito
    lastDoneTs: 0,                     // debounce "serie completata"
    noteEditing: null,                 // indice serie in modifica nota
    exId: null,                        // scheda esercizio aperta
    exReturn: 'teoria',                // view a cui tornare dalla scheda
    theoryTab: 'cavci',                // sezione teoria attiva: cavci | manuale
    theoryQ: ''                        // ricerca nella teoria
  };
}
let S = null;

function loadState(){
  let raw = null;
  try { raw = localStorage.getItem(LS_KEY); } catch(e){ raw = null; }
  if(!raw){ S = defaultState(); saveState(); return; }
  try {
    const parsed = JSON.parse(raw);
    S = defaultState();
    // catalogo e routine restano dal SEED (sono la libreria); ripristino solo dati utente
    if(Array.isArray(parsed.sessions)) S.sessions = parsed.sessions;
    if(Array.isArray(parsed.measurements)) S.measurements = parsed.measurements;
    if(parsed.config){
      S.config.barWeight = num(parsed.config.barWeight, 20);
      if(Array.isArray(parsed.config.plates) && parsed.config.plates.length) S.config.plates = parsed.config.plates.map(Number).filter(x=>x>0);
      S.config.step = num(parsed.config.step, 2.5);
    }
    if(parsed.active){
      S.active = parsed.active; // ripristina sessione interrotta
      // il tempo trascorso ad app chiusa non è allenamento: riprendi in pausa
      if(typeof S.active.elapsedMs !== 'number') S.active.elapsedMs = 0;
      S.active.paused = true;
      S.active.startedAt = Date.now();
    }
  } catch(e){
    S = defaultState();
  }
}
function saveState(){
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      sessions: S.sessions, measurements: S.measurements, config: S.config, active: S.active
    }));
    if(S.saveError){ S.saveError = false; } // ripristinato
    return true;
  } catch(e){
    S.saveError = true; // storage pieno o non disponibile: l'utente deve saperlo (fiducia dati)
    return false;
  }
}
function num(x, d){ const n = Number(x); return Number.isFinite(n) ? n : d; }

// -------- Helper esercizi --------
function ex(id){ return S.exercises[id] || null; }
function isWeighted(e){ return e && (e.equip==='bilanciere'||e.equip==='manubrio'||e.equip==='kettlebell'||e.equip==='macchina'||e.equip==='landmine'||e.equip==='zavorra'||e.equip==='generico'); }
// modalità input: 'peso' (kg + reps), 'reps' (solo ripetizioni), 'tempo' (countdown secondi)
function inputMode(e){
  if(!e) return 'reps';
  if(e.tipo==='hold' || e.tipo==='carry') return 'tempo';
  if(isWeighted(e)) return 'peso';
  return 'reps';
}
function plateMode(e){
  if(!e) return null;
  if(e.equip==='bilanciere') return 'bilanciere';
  if(e.equip==='landmine'||e.equip==='zavorra'||e.equip==='generico') return 'singolo';
  return null; // manubrio/kettlebell/macchina/expander/corpolibero: nessun plate calc
}

// -------- Storico: ultimo valore usato per un esercizio --------
function lastLoggedFor(id){
  for(let i=S.sessions.length-1; i>=0; i--){
    const it = (S.sessions[i].items||[]).find(x=>x.id===id);
    if(it && it.sets && it.sets.length){
      const st = it.sets[0];
      return { w: st.w||0, r: st.r||0, value: it.value };
    }
  }
  return null;
}
function pr1RM(id){
  let best=0, bestW=0, bestR=0;
  for(const s of S.sessions){
    const it=(s.items||[]).find(x=>x.id===id); if(!it)continue;
    for(const st of it.sets||[]){
      if((st.w||0)>0){ const e=estimate1RM(st.w, st.r||1); if(e>best){best=e; bestW=st.w; bestR=st.r;} }
    }
  }
  return best>0 ? { e1rm:best, w:bestW, r:bestR } : null;
}
function maxRepsFor(id){
  let best=0, bestS=null;
  for(const s of S.sessions){ const it=(s.items||[]).find(x=>x.id===id); if(!it)continue;
    for(const st of it.sets||[]){ if((st.r||0)>best){best=st.r; bestS=s;} } }
  return best>0 ? { reps:best, date:bestS?bestS.date:null } : null;
}
// Nuovo record? Confronta una serie con lo storico (S.sessions, che NON include la sessione attiva)
// e con le serie già fatte oggi per lo stesso esercizio. mode: 'peso' -> 1RM, 'reps' -> ripetizioni.
function isNewPR(id, mode, w, r, priorSetsToday){
  if(mode==='tempo') return false;
  if(mode==='peso'){
    if(!(w>0 && r>0)) return false;
    const cur = estimate1RM(w, r);
    const histPR = pr1RM(id); let bench = histPR ? histPR.e1rm : 0;
    for(const d of (priorSetsToday||[])){ if((d.w||0)>0){ bench = Math.max(bench, estimate1RM(d.w, d.r||1)); } }
    if(bench <= 0) return false; // nessun riferimento: primo utilizzo, non è "battere" un record
    return cur > bench + 1e-6 ? { kind:'1rm', value:cur } : false;
  }
  // reps
  if(!(r>0)) return false;
  const histR = maxRepsFor(id); let bench = histR ? histR.reps : 0;
  for(const d of (priorSetsToday||[])){ bench = Math.max(bench, d.r||0); }
  if(bench <= 0) return false;
  return r > bench ? { kind:'reps', value:r } : false;
}
// Progressione 1RM (o reps per bodyweight) nel tempo per un esercizio -> array di numeri cronologici
function progressionSeries(id){
  const out=[];
  const sorted=[...S.sessions].sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  let weighted=null;
  for(const s of sorted){
    const it=(s.items||[]).find(x=>x.id===id); if(!it)continue;
    let bestW=0,bestR=0,best=0,anyW=false;
    for(const st of it.sets||[]){
      if((st.w||0)>0){ anyW=true; const e=estimate1RM(st.w,st.r||1); if(e>best){best=e;bestW=st.w;bestR=st.r;} }
      else if((st.r||0)>bestR){ bestR=st.r; }
    }
    if(weighted===null) weighted = anyW;
    const val = anyW ? best : bestR;
    if(val>0) out.push({date:s.date, val});
  }
  return { weighted: !!weighted, points: out };
}
// Catalogo ordinato per il picker "aggiungi esercizio", con filtro testuale
function catalogList(query){
  const q=(query||'').trim().toLowerCase();
  const arr=Object.values(S.exercises);
  const filtered = q ? arr.filter(e=>(e.nome||'').toLowerCase().includes(q) || (e.muscoli||'').toLowerCase().includes(q)) : arr;
  return filtered.sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
}
// Aggiunge un esercizio del catalogo alla sessione attiva e ci salta sopra
function addExerciseToSession(id){
  const A=S.active; if(!A) return;
  const e=ex(id); if(!e) return;
  const last=lastLoggedFor(id);
  const mode=inputMode(e);
  let w=0,r=0,sec=0;
  if(mode==='peso'){ w=last?last.w:20; r=last?last.r:(e.repsMin||8); }
  else if(mode==='reps'){ r=last?last.r:(e.repsMin||10); }
  else { sec=last?(last.value||e.work||30):(e.work||30); }
  A.items.push({ id, nome:e.nome, mode, order:A.items.length, targetW:w, targetR:r, targetSec:sec, rpe:0, plannedSets:e.sets||3, doneSets:[], added:true });
  A.curIdx=A.items.length-1;
  S.picker=false; S.pickerQ='';
  saveState(); render(); window.scrollTo(0,0);
}
// Rimuove un esercizio dalla sessione attiva (solo se senza serie registrate)
function removeExerciseFromSession(idx){
  const A=S.active; if(!A||!A.items[idx]) return;
  A.items.splice(idx,1);
  if(A.curIdx>=A.items.length) A.curIdx=Math.max(0,A.items.length-1);

}

// AUDIO — beep via Web Audio (nessun file esterno)
// ============================================================
let audioCtx = null, audioUnlocked = false;
function unlockAudio(){
  if(audioUnlocked) return;
  try {
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    // suono muto per sbloccare la policy autoplay iOS
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    g.gain.value=0; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.01);
    audioUnlocked=true;
  } catch(e){ /* audio non disponibile */ }
}
function beep(){
  if(!audioCtx) return;
  try {
    if(audioCtx.state==='suspended') audioCtx.resume();
    const now=audioCtx.currentTime;
    [880, 1320].forEach((freq, i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=freq;
      const t=now+i*0.18;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.3, t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.16);
      o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.18);
    });
  } catch(e){}
}
document.body.addEventListener('touchstart', unlockAudio, { once:false, passive:true });
document.body.addEventListener('click', unlockAudio, { once:false });

// TIMER — countdown robusto (endsAt assoluto)
// ============================================================
let timerRAF = null, timerEndsAt = 0, timerRinging = false, timerRangAt = 0;
let _flashSet = false;   // micro-feedback: la serie appena registrata pulsa una volta
let _wakeLock = null;    // Wake Lock: schermo acceso durante la sessione attiva

// Lo schermo resta acceso in sessione (iOS 16.4+); rilasciato fuori o in pausa. Fallisce in silenzio dove non supportato.
async function syncWakeLock(){
  try{
    const want = S.view==='sessione' && S.active && !S.active.paused;
    if(want && !_wakeLock && typeof navigator!=='undefined' && navigator.wakeLock && navigator.wakeLock.request){
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release', ()=>{ _wakeLock = null; });
    } else if(!want && _wakeLock){
      const wl=_wakeLock; _wakeLock=null; await wl.release();
    }
  }catch(e){ _wakeLock = null; }
}
// iOS rilascia il lock quando blocchi il telefono: lo riprendiamo al ritorno
if (typeof document !== 'undefined' && document.addEventListener) {
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') syncWakeLock(); });
}
const FLASH_MAX_MS = 12000; // il flash di fine recupero si spegne da solo dopo 12s
function startTimer(seconds){
  stopTimer();
  timerEndsAt = Date.now() + seconds*1000;
  timerRinging = false; timerRangAt = 0;
  $('timerBar').classList.remove('hidden');
  $('timerInner').classList.remove('timer-flash');
  const sp = $('timerInner').querySelector('span'); if(sp) sp.textContent = 'Recupero';
  tickTimer();
}
function tickTimer(){
  const remMs = timerEndsAt - Date.now();
  const rem = Math.max(0, Math.ceil(remMs/1000));
  const m = Math.floor(rem/60), s = rem%60;
  $('timerCount').textContent = m + ':' + String(s).padStart(2,'0');
  if(remMs<=0 && !timerRinging){
    timerRinging = true; timerRangAt = Date.now();
    beep();
    $('timerInner').classList.add('timer-flash');
    $('timerCount').textContent = 'Pronto';
    if(navigator.vibrate) try{ navigator.vibrate([200,100,200]); }catch(e){}
  }
  // auto-stop del flash dopo FLASH_MAX_MS (evita lampeggio infinito / spreco batteria)
  if(timerRinging && (Date.now()-timerRangAt) > FLASH_MAX_MS){ stopTimer(); return; }
  timerRAF = requestAnimationFrame(tickTimer);
}
function stopTimer(){
  if(timerRAF) cancelAnimationFrame(timerRAF);
  timerRAF=null; timerRinging=false; timerRangAt=0;
  const bar=$('timerBar'), inner=$('timerInner');
  if(bar) bar.classList.add('hidden');
  if(inner) inner.classList.remove('timer-flash');
}
$('timerSkip').addEventListener('click', stopTimer);

// ---- Readiness: stato del giorno (euristica trasparente, non medicale) ----
const FATIGUE_RE = /dolor|fastidi|stanc|cedim|spent|distrutt|fatica|\bmale\b|indolenz|scaric[ao]|pesant/i;
function daysBetween(a, b){ return Math.floor((a - b) / 86400000); }
function computeReadiness(){
  const sorted = [...S.sessions].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  if(!sorted.length) return { state:'Stai nel piano', msg:'Quando vuoi, si parte. Segui il piano di oggi.', tone:'slate' };
  const now = Date.now();
  const lastMs = new Date(sorted[0].date).getTime();
  const daysSince = isNaN(lastMs) ? 0 : Math.max(0, daysBetween(now, lastMs));
  if(daysSince >= 7) return { state:'Rientro morbido', msg:'Bentornato. Riparti con calma: tornare conta più di recuperare tutto subito.', tone:'sky' };
  let fatigue = 0;
  const recentIds = [...new Set(sorted.slice(0,6).flatMap(s=>(s.items||[]).map(i=>i.id)))];
  if(analyzeDeloadAll(S.sessions, recentIds).suggested) fatigue += 2;
  const last7 = sorted.filter(s=>{ const t=new Date(s.date).getTime(); return !isNaN(t) && daysBetween(now,t)<=7; }).length;
  if(last7 >= 5) fatigue += 1;
  const recentNotes = sorted.slice(0,3).flatMap(s=>[...(s.items||[]).flatMap(i=>(i.sets||[]).map(x=>x.note).filter(Boolean)), s.note].filter(Boolean));
  if(recentNotes.some(n=>FATIGUE_RE.test(n))) fatigue += 2;
  const rpes = sorted.slice(0,3).flatMap(s=>(s.items||[]).map(i=>i.rpe||0)).filter(r=>r>0);
  if(rpes.length && (rpes.reduce((a,b)=>a+b,0)/rpes.length) >= 8.7) fatigue += 1;
  if(fatigue >= 3) return { state:'Recupera', msg:'Oggi va bene leggera.', tone:'orange' };
  if(fatigue >= 1) return { state:'Riduci', msg:'Puoi ridurre il carico.', tone:'amber' };
  if(daysSince <= 2 && last7 <= 4) return { state:'Spingi', msg:'Buona finestra. Se te la senti, spingi.', tone:'violet' };
  return { state:'Stai nel piano', msg:'Segui il piano.', tone:'slate' };
}
// ---- Prossima mossa: l'app conosce il ciclo, tu apri e parti ----
function daysAgoLabel(dateStr){
  const t = new Date(dateStr).getTime();
  if(isNaN(t)) return '';
  const d = Math.max(0, daysBetween(Date.now(), t));
  return d===0 ? 'oggi' : (d===1 ? 'ieri' : d+' giorni fa');
}
function computeNextMove(){
  const cycle = S.routines.filter(r=>r.kind==='struttura'||r.kind==='jolly').sort((a,b)=>(a.n||99)-(b.n||99));
  if(!cycle.length) return null;
  const rd = computeReadiness();
  // il corpo prima del ciclo: se chiede recupero o rientro, la mossa cambia
  if(rd.tone==='orange'){
    const rec = cycle.find(r=>r.id==='recupero');
    if(rec) return { r: rec, why: 'oggi meglio leggera' };
  }
  if(rd.tone==='sky'){
    const p0 = S.routines.find(r=>r.id==='p0');
    if(p0) return { r: p0, why: 'rientro morbido' };
  }
  // ultima sessione riconducibile a una tappa (per id, o per titolo sullo storico vecchio)
  const sorted = [...S.sessions].sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  let lastR = null, lastS = null;
  for(const s of sorted){
    const byId = s.routineId ? cycle.find(r=>r.id===s.routineId) : null;
    const byTitle = byId ? null : cycle.find(r=> s.title && String(s.title).toLowerCase().includes(String(r.nome).toLowerCase()));
    if(byId || byTitle){ lastR = byId || byTitle; lastS = s; break; }
  }
  if(!lastR) return { r: cycle[0], why: 'si parte dalla prima tappa' };
  const next = cycle[(cycle.indexOf(lastR)+1) % cycle.length];
  return { r: next, why: 'il ciclo continua', last: lastR, lastDate: lastS ? lastS.date : null };
}

// una riga di tendenza: apri e sai come sta andando la settimana (silenzio se ferma)
function weekTrace(){
  const now = Date.now(), wk = 7*86400000;
  const t = s => new Date(s.date).getTime();
  const cur  = S.sessions.filter(s => t(s) >= now-wk   && t(s) <= now);
  if(!cur.length) return null;
  const prev = S.sessions.filter(s => t(s) >= now-2*wk && t(s) <  now-wk);
  const vol = a => a.reduce((x,s)=> x+(s.volume||0), 0);
  const cv = vol(cur), pv = vol(prev);
  let trend = '';
  if(cv>0 && pv>0) trend = cv > pv*1.05 ? ' · volume in crescita' : (cv < pv*0.95 ? ' · volume più leggero' : ' · volume stabile');
  return `${cur.length} session${cur.length===1?'e':'i'} negli ultimi 7 giorni${trend}`;
}

// ---- Ritmo: la cadenza vista con onesta. Blocchi e pause, senza streak da difendere ----
function rhythmWeeks(n){
  n = n || 16;
  const counts = new Array(n).fill(0);
  const end = Date.now();
  for(const s of S.sessions){
    const t = new Date(s.date).getTime(); if(isNaN(t)) continue;
    const diff = end - t; if(diff < 0) continue;
    const idx = Math.floor(diff / (7*86400000));
    if(idx < n) counts[n-1-idx]++;
  }
  return counts;
}
function rhythmSvg(){
  const c = rhythmWeeks(16);
  const W = 320, H = 26, step = W/c.length;
  let dots = '';
  c.forEach((k,i)=>{
    const cx = step*i + step/2, cy = H/2;
    if(k > 0){
      const r = k>=3 ? 5.5 : (k===2 ? 4.8 : 4);
      const op = k>=3 ? 1 : (k===2 ? 0.8 : 0.55);
      dots += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#5AA2FF" opacity="${op}"/>`;
    } else {
      dots += `<circle cx="${cx}" cy="${cy}" r="4" fill="none" stroke="#9496AE" stroke-width="1" opacity="0.3"/>`;
    }
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" aria-hidden="true">${dots}</svg>`;
}

// -------- Costruzione sessione da routine --------
function buildActive(routineId, variant){
  const r = S.routines.find(x=>x.id===routineId);
  if(!r) return null;
  let ids = [];
  if(variant==='manuale'){
    for(const b of r.blocchi||[]) ids.push(...(b.ex||[]));
  } else if(variant==='corpolibero'){
    ids = (r.exCorpoLibero||[]).slice();
  } else {
    ids = (r.exAttrezzi||[]).slice();
  }
  ids = ids.filter(id=>S.exercises[id]);
  const items = ids.map((id, idx)=>{
    const e = ex(id);
    const last = lastLoggedFor(id);
    const mode = inputMode(e);
    let w=0, r2=0, sec=0;
    if(mode==='peso'){ w = last? last.w : 20; r2 = last? last.r : (e.repsMin||8); }
    else if(mode==='reps'){ r2 = last? last.r : (e.repsMin||10); }
    else { sec = last? (last.value||e.work||30) : (e.work||30); }
    return {
      id, nome: e.nome, mode, order: idx,
      targetW: w, targetR: r2, targetSec: sec,
      rpe: 0, plannedSets: e.sets||3, doneSets: [],
    };
  });
  // Rientro a costo zero: dopo 14+ giorni di pausa i carichi partono alleggeriti (~10%),
  // arrotondati al passo dei dischi. La prima sessione non deve essere un esame.
  let rientro = false;
  const _lastT = S.sessions.length ? Math.max(...S.sessions.map(s=>new Date(s.date).getTime()).filter(t=>!isNaN(t))) : null;
  if(_lastT && daysBetween(Date.now(), _lastT) >= 14){
    rientro = true;
    for(const it of items){
      if(it.mode==='peso' && it.targetW>0) it.targetW = Math.max(0, Math.round(it.targetW*0.9/2.5)*2.5);
    }
  }
  // deload check su esercizi pesati della sessione (sospeso se il rientro ha gia alleggerito)
  const weightedIds = items.filter(it=>it.mode==='peso').map(it=>it.id);
  const deload = rientro ? { suggested:false, triggered:[] } : analyzeDeloadAll(S.sessions, weightedIds);
  const title = variant==='corpolibero' && r.nomeCorpoLibero ? r.nomeCorpoLibero : r.nome;
  return {
    routineId, variant, title, rientro,
    startedAt: Date.now(), elapsedMs: 0, paused: false, // cronometro sessione con pausa
    items, curIdx: 0, deloadInfo: deload, deloadApplied: false
  };
}

// ---- Cronometro sessione (con pausa) ----
function sessionActiveMs(){
  const A=S.active; if(!A) return 0;
  return (A.elapsedMs||0) + (A.paused ? 0 : (Date.now() - A.startedAt));
}
function consolidateSessionClock(){
  const A=S.active; if(!A) return;
  if(!A.paused){ A.elapsedMs = (A.elapsedMs||0) + (Date.now() - A.startedAt); A.startedAt = Date.now(); }
}
function pauseSession(){
  const A=S.active; if(!A||A.paused) return;
  consolidateSessionClock(); A.paused = true; saveState(); render();
}
function resumeSession(){
  const A=S.active; if(!A||!A.paused) return;
  A.startedAt = Date.now(); A.paused = false; saveState(); render();
}
function fmtClock(ms){
  const s=Math.max(0,Math.floor(ms/1000)); const m=Math.floor(s/60), ss=s%60;
  const hh=Math.floor(m/60), mm=m%60;
  return hh>0 ? `${hh}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}` : `${mm}:${String(ss).padStart(2,'0')}`;
}

// riordina gli esercizi mantenendo il focus sull'esercizio corrente
function reorderItems(from, to){
  const A=S.active; if(!A) return;
  if(from===to || from<0 || to<0 || from>=A.items.length || to>=A.items.length) return;
  const curId = A.items[A.curIdx] ? A.items[A.curIdx].id : null;
  const [moved] = A.items.splice(from,1);
  A.items.splice(to,0,moved);
  // ripristino curIdx sull'esercizio che era selezionato
  if(curId!=null){ const ni=A.items.findIndex(x=>x.id===curId); if(ni>=0) A.curIdx=ni; }
  saveState(); render(); flashHint('Ordine aggiornato.');
}

  const heroNum = hasVol ? formatKg(su.volume) : String(Math.round(su.durationSec/60));
  const heroUnit = hasVol ? 'kg sollevati' : 'minuti attivi';
  let h = `<div class="text-xs uppercase tracking-widest text-emerald-400 mb-6 mt-2">Sessione salvata</div>`;
  // numero eroe: protagonista assoluto
  h += `<div class="mb-8">
    <div class="text-7xl font-bold tabular-nums leading-none tracking-tight">${heroNum}</div>
    <div class="text-base text-slate-500 mt-2">${heroUnit}</div>
    <div class="text-sm text-slate-500 mt-1">${esc(su.title)}</div>
  </div>`;
  h += `<div class="text-base text-slate-400 leading-relaxed mb-9">${msg}</div>`;
  // metriche minori: riga in scala, non quattro quadrati
  const mini = [];
  if(hasVol) mini.push([Math.round(su.durationSec/60)+'′','tempo']);
  else mini.push([formatKg(su.volume),'kg']);
  mini.push([su.exercises,'esercizi']);
  mini.push([su.sets,'serie']);
  h += `<div class="flex gap-10 items-baseline mb-9">`;
  for(const [v,l] of mini){
    h += `<div><div class="text-2xl font-bold tabular-nums text-slate-100">${v}</div><div class="text-sm text-slate-500 mt-0.5">${l}</div></div>`;
  }
  h += `</div>`;
  if(su.prs && su.prs.length){
    h += `<div class="mb-9">
      <div class="text-xs uppercase tracking-widest text-violet-400 mb-3">Primati di oggi</div>`;
    for(const p of su.prs){
      const v = p.kind==='1rm' ? `${formatKg(p.value)}kg 1RM` : `${p.value} rip.`;
      h += `<div class="text-base text-slate-100 py-1">${esc(p.nome)} — <b class="text-violet-400">${v}</b></div>`;
    }
    h += `</div>`;
  }
  if(su.notes && su.notes.length){
    h += `<div class="mb-9">
      <div class="text-xs uppercase tracking-widest text-slate-500 mb-3">Cosa hai annotato</div>`;
    for(const n of su.notes){
      h += `<div class="text-sm text-slate-400 py-1"><span class="text-slate-500">${esc(n.nome)}:</span> ${esc(n.note)}</div>`;
    }
    if(su.hasFatigue){
      h += `<div class="text-sm text-red-400 mt-3 leading-relaxed">Un po' di fatica: nei prossimi giorni tieni il carico morbido.</div>`;
    }
    h += `</div>`;
  }
  h += `<div class="mb-10">
    <div class="text-xs uppercase tracking-widest text-slate-500 mb-3">Com'è andata</div>
    <input id="snoteInput" type="text" maxlength="140" placeholder="Una riga, se ti va — anche due parole" class="w-full bg-transparent text-base text-slate-100 placeholder-slate-600 pb-2 border-b border-slate-600 focus:outline-none focus:border-emerald-400">
  </div>`;
  h += `<button data-act="close-summary" class="text-xl font-bold text-emerald-400 py-3 active:opacity-55">Fatto →</button>`;
  return h;
}

// risultati di ricerca: tutti gli esercizi con teoria che matchano nome/muscoli/categoria
function theorySearchResults(q){
  const results = [];
  for(const id of Object.keys(THEORY_DATA.ex)){
    const e = ex(id); if(!e) continue;
    const hay = `${e.nome||''} ${e.muscoli||''} ${e.categoria||''}`.toLowerCase();
    if(hay.includes(q)) results.push(e);
  }
  results.sort((a,b)=>a.nome.localeCompare(b.nome));
  let h = `<div class="text-xs text-slate-500 mb-2">${results.length} ${results.length===1?'esercizio trovato':'esercizi trovati'}</div>`;
  if(!results.length){
    return h + `<div class="text-base text-slate-400 leading-relaxed">Nessun esercizio corrisponde. Prova con un altro termine (es. "gluteo", "spinta", "core").</div>`;
  }
  h += `<div class="space-y-1">`;
  for(const e of results){
    h += `<button data-exsheet="${esc(e.id)}" class="w-full text-left px-1 py-3">
      <div class="text-sm text-slate-100">${esc(e.nome)}</div>
      <div class="text-xs text-slate-500">${esc(e.categoria||'')}${e.muscoli?` · ${esc(e.muscoli)}`:''}</div>
    </button>`;
  }
  h += `</div>`;
  return h;
}

function figureKey(id, e){
  const byId = { cyclette:'bike', supinecycle:'bike', glutebridge:'bridge', tgu:'getup', bwgetup:'getup',
    'wall-handstand':'press', pikepush:'press', 'pike-pushup':'press', dip:'push', chinup:'pullup', deadhang:'hang',
    burpee:'run', 'jump-squat':'squat',
    breath90:'mobility', childpose:'mobility', mobility:'mobility', hipflexor:'mobility', 'leg-swing':'mobility', tibialis:'mobility' };
  if(byId[id]) return byId[id];
  const s = ((e.nome||'')+' '+(e.nomeMetodo||'')+' '+(e.categoria||'')+' '+(e.muscoli||'')).toLowerCase();
  const has = (...w)=>w.some(x=>s.includes(x));
  if(e.tipo==='carry' || has('carry','farmer','trasporto','sled','crawl','bear','crab')) return 'carry';
  if(has('handstand','spinta verticale')) return 'press';
  if(has('dead hang','deadhang','appes')) return 'hang';
  if(has('chin','trazione presa','pull-up','pullup')) return 'pullup';
  if(has('rematore','remat','row','trazione orizz','face pull','reverse fly','rear delt','inverted')) return 'row';
  if(has('hinge','stacco','rdl','swing','nordic','femorali')) return 'hinge';
  if(has('affondo','lunge','split','pistol','monopod','single leg','una gamba','cossack','balance')) return 'lunge';
  if(has('squat','goblet','accosci')) return 'squat';
  if(has('dip','push-up','pushup','piegament','panca','spinta orizz','archer','plank → push')) return 'push';
  if(has('plank','hollow','dragon','dead bug','deadbug','bird dog','birddog','anti-estensione','anti-rotazione')) return 'plank';
  if(has('ponte','bridge','glute')) return 'bridge';
  if(has('corr','camminat','corsa','march','ginocchia','mountain','high knee','burpee','jumping','salto','jump','cardio','locomozione')) return 'run';
  if(has('mobilit','stretch','respir','breath','flessor','recupero','reset')) return 'mobility';
  if(e.tipo==='hold') return 'plank';
  return 'squat';
}
function exerciseFigure(id, e){
  const f = FIG[figureKey(id, e)] || FIG.squat;
  const dur=(f.dur||2.4)+'s', kt='0;0.5;1', spl='0.42 0 0.58 1;0.42 0 0.58 1';
  const A=(name,a,b)=>`<animate attributeName="${name}" dur="${dur}" repeatCount="indefinite" calcMode="spline" keyTimes="${kt}" keySplines="${spl}" values="${a};${b};${a}"/>`;
  let s='';
  (f.acc||[]).forEach(a=>{ s += a.t==='line'
     ? `<line x1="${a.c[0]}" y1="${a.c[1]}" x2="${a.c[2]}" y2="${a.c[3]}" stroke="#5AA2FF" stroke-width="3.6"/>`
     : `<circle cx="${a.c[0]}" cy="${a.c[1]}" r="${a.c[2]}" stroke="#5AA2FF" stroke-width="3.4"/>`; });
  (f.accRect||[]).forEach(r=>{ s+=`<rect x="${r.x}" y="${r.y}" width="${r.w}" height="${r.h}" rx="1.5" fill="#5AA2FF" stroke="none"/>`; });
  if(f.barMove){ const [a,b]=f.barMove; s+=`<line x1="${a[0]}" y1="${a[1]}" x2="${a[2]}" y2="${a[3]}" stroke="#5AA2FF" stroke-width="4.5">${A('x1',a[0],b[0])}${A('y1',a[1],b[1])}${A('x2',a[2],b[2])}${A('y2',a[3],b[3])}</line>`; }
  f.body.forEach(pr=>{ s+=`<path d="${pr[0]}">${A('d',pr[0],pr[1])}</path>`; });
  if(f.head){ const [a,b]=f.head; s+=`<circle cx="${a[0]}" cy="${a[1]}" r="6">${A('cx',a[0],b[0])}${A('cy',a[1],b[1])}</circle>`; }
  if(f.weight){ const w=f.weight; s+=`<rect x="${w.A[0]}" y="${w.A[1]}" width="${w.w}" height="${w.h}" rx="1.5" fill="#5AA2FF" stroke="none">${A('x',w.A[0],w.B[0])}${A('y',w.A[1],w.B[1])}</rect>`; }
  return `<svg viewBox="0 0 120 100" width="100%" height="100%" fill="none" stroke="#F2F3F9" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">${s}</svg>`;
}

function viewEsercizio(){

  const th = THEORY_DATA.ex[id] || {};

    h += `<div class="space-y-6 mb-12">`;
    for(const [k,v] of chips){
      h += `<div><div class="text-[11px] uppercase tracking-widest text-slate-500 mb-1.5">${k}</div><div class="text-base text-slate-200 leading-relaxed">${esc(v)}</div></div>`;
    }
    h += `</div>`;
  }

  // fasi del movimento
  if(th.fasi && th.fasi.length){
    h += `<div class="mb-12">
      <div class="text-[11px] uppercase tracking-widest text-emerald-400 mb-6">Fasi del movimento</div>
      <div class="space-y-7">`;
    th.fasi.forEach((f,i)=>{
      h += `<div class="flex gap-4">
          <div class="text-emerald-400 font-bold text-lg leading-none pt-0.5 tabular-nums">${i+1}</div>
          <div class="flex-1"><div class="text-base font-medium text-slate-100 leading-snug">${esc(f[0])}</div>
          <div class="text-sm text-slate-400 mt-1.5 leading-relaxed">${esc(f[1])}</div></div>
        </div>`;
    });
    h += `</div></div>`;
  }

  // errori e correzioni
  if(th.errori && th.errori.length){
    h += `<div class="mb-10">
      <div class="text-[11px] uppercase tracking-widest text-red-400 mb-6">Errori & correzioni</div>
      <div class="space-y-7">`;
    for(const er of th.errori){
      h += `<div>
        <div class="text-base text-slate-100 leading-snug">${esc(er[0])}</div>
        <div class="text-sm text-slate-400 mt-1.5 leading-relaxed">→ ${esc(er[1])}</div></div>`;
    }
    h += `</div></div>`;
  }

  if(!th.fasi && !th.errori && !th.ritmo){
    h += `<div class="text-base text-slate-400 leading-relaxed">Scheda tecnica dettagliata non disponibile per questo esercizio (proviene dallo storico).</div>`;
  }
  return h;
}

// -------- VIEW: Record --------
function viewRecord(){
  let h = `<h1 class="text-3xl font-bold mb-2 tracking-tight">Record</h1>
  <p class="text-base text-slate-400 mb-8 leading-relaxed">Massimali stimati (Epley) sugli esercizi con carico; record di ripetizioni per il corpo libero.</p>`;
  const seen = new Set();
  for(const s of S.sessions) for(const it of s.items||[]) seen.add(it.id);
  const weighted = [], bw = [];
  for(const id of seen){
    const e = ex(id); if(!e) continue;
    const pr = pr1RM(id);
    if(pr){ weighted.push({id, e, pr}); }
    else { const mr = maxRepsFor(id); if(mr && mr.reps>0) bw.push({id, e, mr}); }
  }
  weighted.sort((a,b)=>b.pr.e1rm - a.pr.e1rm);
  bw.sort((a,b)=>b.mr.reps - a.mr.reps);

  h += `<div class="text-xs uppercase tracking-widest text-slate-500 mb-4">Carico</div><div class="mb-10">`;
  for(const x of weighted){
    const open = S.expandedRecord === x.id;
    h += `<div class="mb-5">
      <button data-record="${esc(x.id)}" class="w-full flex justify-between items-baseline gap-3 text-left active:opacity-55">

    if(open){
      const prog = progressionSeries(x.id);
      h += `<div class="mt-2">`;

        h += sparklineVals(prog.points.map(p=>p.val));

        const diff=round1(last-first);
        h += `<div class="text-sm text-slate-500 mt-1">${prog.points.length} sessioni · dalla prima <b class="${diff>=0?'text-emerald-400':'text-slate-400'}">${diff>=0?'+':''}${formatKg(diff)}kg 1RM</b></div>`;
      } else {
        h += `<div class="text-sm text-slate-500">Storico insufficiente per la progressione.</div>`;
      }
      h += `</div>`;
    }
    h += `</div>`;
  }
  if(!weighted.length) h += `<p class="text-base text-slate-500">Nessun carico registrato.</p>`;
  h += `</div>`;

  h += `<div class="text-xs uppercase tracking-widest text-slate-500 mb-4">Corpo libero / tempo</div><div>`;
  for(const x of bw.slice(0,40)){
    h += `<div class="flex justify-between items-baseline gap-3 mb-4">
      <span class="text-base text-slate-100 min-w-0 truncate">${esc(x.e.nome)}</span>
      <span class="shrink-0"><span class="text-2xl font-bold text-emerald-400 tabular-nums">${x.mr.reps}</span><span class="text-sm text-slate-500"> ${x.e.tipo==='hold'||x.e.tipo==='carry'?'':'rip.'}</span></span>
    </div>`;
  }
  if(!bw.length) h += `<p class="text-base text-slate-500">Nessun record a corpo libero.</p>`;
  h += `</div>`;
  return h;
}

// mini sparkline SVG del peso (nessuna libreria)
function sparkline(ms){
  if(ms.length < 2) return '';
  return sparklineVals(ms.map(m=>Number(m.weight_kg)));
}
// sparkline generica da un array di numeri
function sparklineVals(vals){
  if(!vals || vals.length < 2) return '';
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max-min) || 1;
  const W=280, H=48, pad=4;
  const step = vals.length>1 ? (W-2*pad)/(vals.length-1) : 0;
  const pts = vals.map((v,i)=>{
    const x = pad + i*step;
    const y = pad + (1-(v-min)/range)*(H-2*pad);
    return `${round1(x)},${round1(y)}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" class="w-full mt-2" preserveAspectRatio="none" style="height:48px">
    <polyline points="${pts}" fill="none" stroke="#5AA2FF" stroke-width="2" vector-effect="non-scaling-stroke"/>
  </svg>
  <div class="flex justify-between text-[10px] text-slate-500"><span>${formatKg(min)}kg</span><span>${formatKg(max)}kg</span></div>`;
}

// ============================================================
// EVENT BINDING (delegato, rilegato ad ogni render)
// ============================================================
function bindDynamic(){
  const app = $('app');
  app.onclick = (ev)=>{
    if(Date.now()-holdEndedAt < 350 || Date.now()-dragEndedAt < 350){ return; } // ignora click sintetico post long-press/drag
    const t = ev.target.closest('button');
    if(!t) return;

    // apri anteprima della tappa (non parte subito: prima guardi e decidi)
    if(t.dataset.start){ openPreview(t.dataset.start, t.dataset.variant); return; }
    if(t.dataset.act==='preview-variant'){ if(S.preview){ S.preview.variant=t.dataset.variant; saveState(); render(); } return; }
    if(t.dataset.act==='preview-start'){ if(S.preview){ startSession(S.preview.routineId, S.preview.variant); } return; }
    if(t.dataset.act==='preview-back'){ S.preview=null; S.view='allena'; saveState(); render(); return; }
    if(t.dataset.exview){ openExercise(t.dataset.exview, 'anteprima'); return; }
    // resume/discard sessione
    if(t.dataset.act==='resume'){ S.view='sessione'; saveState(); render(); return; }
    if(t.dataset.act==='discard'){ S.active=null; saveState(); render(); return; }
    // jump / rimuovi esercizio
    if(t.dataset.jump!=null){ S.active.curIdx = +t.dataset.jump; stopTimer(); saveState(); render(); return; }
    if(t.dataset.rmex!=null){ removeExerciseFromSession(+t.dataset.rmex); return; }
    if(t.dataset.delset!=null){ S.active.items[S.active.curIdx].doneSets.splice(+t.dataset.delset,1); if(S.noteEditing===+t.dataset.delset)S.noteEditing=null; saveState(); render(); flashHint('Serie rimossa. Puoi rifarla quando vuoi.'); return; }
    if(t.dataset.rpe!=null){ S.active.items[S.active.curIdx].rpe = +t.dataset.rpe; saveState(); render(); return; }
    // note per serie
    if(t.dataset.noteedit!=null){ const i=+t.dataset.noteedit; S.noteEditing = (S.noteEditing===i?null:i); render(); return; }
    if(t.dataset.notesave!=null){ const i=+t.dataset.notesave; const inp=$('noteInput');
      const v=inp?inp.value.trim():''; const d=S.active.items[S.active.curIdx].doneSets[i];
      if(d){ if(v) d.note=v; else delete d.note; }
      if(v && FATIGUE_RE.test(v) && S.active.fatigueHint!=='dismissed') S.active.fatigueHint=true; // giornata storta: nota di fatica
      S.noteEditing=null; saveState(); render(); if(v)flashHint('Nota salvata.'); return; }
    if(t.dataset.notecancel!=null){ S.noteEditing=null; render(); return; }
    if(t.dataset.drag!=null){ return; } // l'handle di drag è gestito dai pointer events, il click è no-op
    // teoria / metodo
    if(t.dataset.act==='open-theory'){ S.view='teoria'; S.theoryTab='cavci'; saveState(); render(); window.scrollTo(0,0); return; }
    if(t.dataset.act==='theory-back'){ S.view='allena'; S.theoryQ=''; saveState(); render(); return; }
    if(t.dataset.act==='theory-clear'){ S.theoryQ=''; render(); setTimeout(()=>{ const s=$('theorySearch'); if(s)try{s.focus();}catch(_){}} ,0); return; }
    if(t.dataset.theorytab!=null){ S.theoryTab=t.dataset.theorytab; render(); window.scrollTo(0,0); return; }
    if(t.dataset.exsheet!=null){ openExercise(t.dataset.exsheet, 'teoria'); return; }
    if(t.dataset.act==='ex-tech'){ if(S.active){ const it=S.active.items[S.active.curIdx]; if(it) openExercise(it.id,'sessione'); } return; }
    if(t.dataset.act==='ex-back'){ S.view=S.exReturn||'teoria'; S.exId=null; saveState(); render(); window.scrollTo(0,0); return; }
    // picker aggiungi esercizio
    if(t.dataset.addex!=null){ addExerciseToSession(t.dataset.addex); return; }
    // storico espandi/elimina
    if(t.dataset.expand!=null){ const id=Number(t.dataset.expand); S.expandedSession = (S.expandedSession===id?null:id); render(); return; }
    if(t.dataset.delsession!=null){ const id=Number(t.dataset.delsession);
      if(confirm('Eliminare definitivamente questa sessione dallo storico?')){ S.sessions=S.sessions.filter(x=>x.id!==id); S.expandedSession=null; saveState(); render(); } return; }
    // record progressione
    if(t.dataset.record!=null){ S.expandedRecord = (S.expandedRecord===t.dataset.record?null:t.dataset.record); render(); return; }

    // config
    if(t.dataset.step!=null){ S.config.step = +t.dataset.step; saveState(); render(); return; }
    if(t.dataset.plateRm!=null){ S.config.plates = S.config.plates.filter(p=>p!==+t.dataset.plateRm); saveState(); render(); return; }
    if(t.dataset.plateAdd!=null){ const v=+t.dataset.plateAdd; if(!S.config.plates.includes(v)){ S.config.plates.push(v); } saveState(); render(); return; }
    if(t.dataset.bwdel!=null){ S.measurements = (S.measurements||[]).filter(m=>String(m.date)!==t.dataset.bwdel); saveState(); render(); return; }

    const a = t.dataset.act;
    if(!a) return;
    const A = S.active, it = A ? A.items[A.curIdx] : null;
    switch(a){
      case 'back': stopTimer(); S.view='allena'; saveState(); render(); break;
      case 'done-set': _flashSet = true; doneSet(); break;
      case 'prev-ex': if(A.curIdx>0){ A.curIdx--; stopTimer(); S.noteEditing=null; saveState(); render(); } break;
      case 'next-ex': if(A.curIdx<A.items.length-1){ A.curIdx++; stopTimer(); S.noteEditing=null; saveState(); render(); } break;
      case 'finish': finishSession(); break;
      case 'pause-session': pauseSession(); break;
      case 'resume-session': resumeSession(); break;
      case 'fatigue-lighten': A.fatigueHint='dismissed'; applyDeload(); flashHint('Carico ridotto sul resto della sessione.'); break;
      case 'fatigue-ok': A.fatigueHint='dismissed'; saveState(); render(); break;
      case 'deload-yes': applyDeload(); break;
      case 'deload-no': A.deloadApplied=true; saveState(); render(); break;
      case 'open-picker': S.picker=true; S.pickerQ=''; render(); break;
      case 'close-picker': S.picker=false; render(); break;
      case 'close-summary': saveSummaryNote($('snoteInput') ? $('snoteInput').value : ''); S.summary=null; S.view='storico'; saveState(); render(); break;
      case 'bw-save': saveBodyweight(); break;
      case 'export': exportBackup(); break;
      case 'import': $('importFile').click(); break;
      // gli stepper (w/r/sec/bar/bw -inc/-dec) sono gestiti da applyStepAction (click singolo + long-press)
      default: if(/-(inc|dec)$/.test(a)){ applyStepAction(a); saveState(); render(); }
    }
  };
  const imp = $('importFile');
  if(imp) imp.onchange = importBackup;
  const pin = $('pickerInput');
  if(pin){ pin.oninput = (e)=>{ S.pickerQ = e.target.value; renderPickerListOnly(); }; setTimeout(()=>{ try{pin.focus();}catch(_){}} ,0); }
  const nin = $('noteInput');
  if(nin){ setTimeout(()=>{ try{ nin.focus(); const l=nin.value.length; nin.setSelectionRange(l,l); }catch(_){}} ,0); }
  const tin = $('theorySearch');
  if(tin){ tin.oninput = (e)=>{ S.theoryQ = e.target.value; renderTheoryBodyOnly(); }; }
}

// aggiorna solo la lista del picker durante la digitazione (evita di perdere il focus dell'input)
function renderPickerListOnly(){
  if(!S.picker) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = pickerOverlay();
  const fresh = tmp.querySelector('.overflow-y-auto');
  const cur = document.querySelector('#app .fixed .overflow-y-auto');
  if(fresh && cur) cur.innerHTML = fresh.innerHTML;
}

// muta lo stato per un'azione stepper; ritorna true se ha cambiato qualcosa
function applyStepAction(a){
  const A=S.active, it=A?A.items[A.curIdx]:null;
  const step=S.config.step||2.5;
  switch(a){
    case 'w-dec': if(!it)return false; it.targetW=Math.max(0, round2(it.targetW-step)); return true;
    case 'w-inc': if(!it)return false; it.targetW=round2(it.targetW+step); return true;
    case 'r-dec': if(!it)return false; it.targetR=Math.max(0, it.targetR-1); return true;
    case 'r-inc': if(!it)return false; it.targetR=it.targetR+1; return true;
    case 'sec-dec': if(!it)return false; it.targetSec=Math.max(5, it.targetSec-5); return true;
    case 'sec-inc': if(!it)return false; it.targetSec=it.targetSec+5; return true;
    case 'bar-dec': S.config.barWeight=Math.max(0, round2(S.config.barWeight-1.25)); return true;
    case 'bar-inc': S.config.barWeight=round2(S.config.barWeight+1.25); return true;
    case 'bw-dec': { const b=S.weightInput!=null?S.weightInput:currentBodyweight(); S.weightInput=round1(Math.max(30,b-0.1)); return true; }
    case 'bw-inc': { const b=S.weightInput!=null?S.weightInput:currentBodyweight(); S.weightInput=round1(b+0.1); return true; }
  }
  return false;
}

// ---- Long-press sugli stepper: attaccato UNA volta sola al container #app ----
let holdTimer=null, holdInterval=null, holdRepeated=false, holdEndedAt=0;
function endHold(){ if(holdTimer)clearTimeout(holdTimer); if(holdInterval)clearTimeout(holdInterval); holdTimer=holdInterval=null; }
function bindHoldListeners(){
  const app = document.getElementById('app');
  app.addEventListener('pointerdown', (e)=>{
    const b = e.target.closest('button[data-act]');
    if(!b) return;
    const a = b.dataset.act;
    if(!/-(inc|dec)$/.test(a)) return;
    holdRepeated=false; endHold();
    holdTimer=setTimeout(()=>{
      let speed=140;
      const rep=()=>{
        if(applyStepAction(a)){ holdRepeated=true; updateStepDisplay(b, a); }
        speed=Math.max(45, speed-12);
        holdInterval=setTimeout(rep, speed);
      };
      rep();
    }, 380); // dopo 380ms di pressione continua parte la ripetizione accelerata
  });
  ['pointerup','pointerleave','pointercancel'].forEach(evt=>{
    app.addEventListener(evt, ()=>{ const was=holdRepeated; endHold(); if(was){ holdEndedAt=Date.now(); saveState(); render(); } });
  });
}
// aggiorna il numero mostrato accanto al bottone durante il long-press (senza full render, per fluidità)
function updateStepDisplay(btn, a){
  const A=S.active, it=A?A.items[A.curIdx]:null;
  const key = a.split('-')[0];
  const el = document.getElementById('val'+key.toUpperCase());
  if(!el) return;
  let v='';
  if(key==='w'&&it) v=formatKg(it.targetW);
  else if(key==='r'&&it) v=String(it.targetR);
  else if(key==='sec'&&it) v=String(it.targetSec);
  else if(key==='bar') v=formatKg(S.config.barWeight);
  else if(key==='bw') v=formatKg(S.weightInput!=null?S.weightInput:currentBodyweight());
  if(v!=='') el.textContent=v;
}

// ---- Drag per riordinare gli esercizi (pointer events, funziona su touch) ----
let dragFrom=null, dragTo=null, dragging=false, dragEndedAt=0;
function clearDragHighlight(){
  document.querySelectorAll('[data-exrow]').forEach(r=>{ r.style.outline=''; r.style.outlineOffset=''; });
}
function bindDragListeners(){
  const app=document.getElementById('app');
  app.addEventListener('pointerdown', (e)=>{
    const h=e.target.closest('button[data-drag]');
    if(!h) return;
    e.preventDefault(); // niente scroll: il gesto è un drag
    dragging=true; dragFrom=+h.dataset.drag; dragTo=dragFrom;
  });
  document.addEventListener('pointermove', (e)=>{
    if(!dragging) return;
    const el=document.elementFromPoint(e.clientX, e.clientY);
    const row=el?el.closest('[data-exrow]'):null;
    clearDragHighlight();
    if(row){ dragTo=+row.dataset.exrow; row.style.outline='2px solid #5AA2FF'; row.style.outlineOffset='-2px'; }
  });
  const endDrag=()=>{
    if(!dragging) return;
    const from=dragFrom, to=dragTo;
    dragging=false; dragFrom=null; dragTo=null; dragEndedAt=Date.now();
    clearDragHighlight();
    if(from!=null && to!=null && from!==to) reorderItems(from, to);
  };
  document.addEventListener('pointerup', endDrag);
  document.addEventListener('pointercancel', ()=>{ dragging=false; dragFrom=null; dragTo=null; clearDragHighlight(); });
}

function openPreview(routineId, variant){
  S.preview = { routineId, variant: variant||'attrezzi' };
  S.view = 'anteprima'; saveState(); render(); window.scrollTo(0,0);
}
function startSession(routineId, variant){
  unlockAudio();
  const A = buildActive(routineId, variant);
  if(!A) return;
  S.preview = null;
  S.active = A; S.view='sessione'; saveState(); render(); window.scrollTo(0,0);
}

function applyDeload(){
  const A = S.active;
  for(const it of A.items){
    if(it.mode==='peso'){ const r=applyDeloadToTarget(it.targetW, it.targetR); it.targetW=r.targetWeight; }
    else if(it.mode==='reps'){ const r=applyDeloadToTarget(0, it.targetR); it.targetR=r.targetReps; }
  }
  A.deloadApplied=true; saveState(); render();
}

// -------- Serie completata: le 4 azioni simultanee --------
function doneSet(){
  unlockAudio();
  const now = Date.now();
  if(now - S.lastDoneTs < 450) return; // debounce anti doppio-tap accidentale
  S.lastDoneTs = now;
  const A = S.active, it = A.items[A.curIdx], e = ex(it.id);
  // guard: in peso/reps servono ripetizioni valide
  if(it.mode!=='tempo' && (!it.targetR || it.targetR<=0)){ flashHint('Segna quante ripetizioni hai fatto, poi registra'); return; }
  if(it.mode==='tempo' && (!it.targetSec || it.targetSec<=0)){ flashHint('Imposta quanti secondi è durata la tenuta'); return; }
  // rilevo se è un nuovo record PRIMA di registrare (confronto con storico + serie di oggi)
  const pr = isNewPR(it.id, it.mode, it.targetW, it.targetR, it.doneSets);
  // 1) registra
  let rec;
  if(it.mode==='peso') rec = { w: it.targetW, r: it.targetR, rpe: it.rpe };
  else if(it.mode==='reps') rec = { w: 0, r: it.targetR, rpe: it.rpe };
  else rec = { w: 0, r: 0, sec: it.targetSec, rpe: it.rpe };
  if(pr) rec.pr = pr; // marca la serie come record
  it.doneSets.push(rec);
  S.noteEditing = null; // chiudo eventuale editing nota
  consolidateSessionClock(); // salva il tempo attivo maturato finora
  if((it.rpe||0) >= 10 && A.fatigueHint !== 'dismissed') A.fatigueHint = true; // giornata storta: RPE al massimo
  // 2) (1RM già mostrato live) — 3) timer adattivo
  const base = e.rest || 90;
  const rest = adaptiveRestSeconds(base, it.rpe);
  if(it.mode==='tempo'){
    startHold(it.targetSec, rest);
  } else {
    startTimer(rest);
  }
  saveState(); render();
}
// micro-avviso temporaneo (senza alert bloccante)
let flashTimeout=null;
function flashHint(msg){
  const el=$('flashHint');
  if(!el) { render(); return; }
  el.textContent=msg; el.classList.remove('hidden');
  if(flashTimeout) clearTimeout(flashTimeout);
  flashTimeout=setTimeout(()=>{ const e2=$('flashHint'); if(e2) e2.classList.add('hidden'); }, 2200);
}

// tenuta a tempo: countdown lavoro -> beep -> countdown recupero
function startHold(workSec, restSec){
  stopTimer();
  timerEndsAt = Date.now() + workSec*1000;
  timerRinging = false;
  $('timerBar').classList.remove('hidden');
  $('timerInner').classList.remove('timer-flash');
  $('timerInner').querySelector('span').textContent = 'Tenuta';
  const holdTick = ()=>{
    const remMs = timerEndsAt - Date.now();
    const rem = Math.max(0, Math.ceil(remMs/1000));
    $('timerCount').textContent = Math.floor(rem/60)+':'+String(rem%60).padStart(2,'0');
    if(remMs<=0){
      beep(); if(navigator.vibrate) try{navigator.vibrate(200);}catch(e){}
      $('timerInner').querySelector('span').textContent = 'Recupero';
      startTimer(restSec);
      return;
    }
    timerRAF = requestAnimationFrame(holdTick);
  };
  if(timerRAF) cancelAnimationFrame(timerRAF);
  holdTick();
}

function finishSession(){
  const A = S.active;
  const prs = []; // record ottenuti in questa sessione
  const items = A.items.filter(it=>it.doneSets.length>0).map((it, i)=>{
    const e = ex(it.id);
    let unit = it.mode==='peso' ? 'kg' : (it.mode==='reps' ? 'rip.' : 'sec');
    const sets = it.doneSets.map(d=>{
      const s = it.mode==='tempo' ? { w:0, r:0, sec:d.sec||0 } : { w:d.w||0, r:d.r||0 };
      if(d.note) s.note = d.note;
      return s;
    });
    let value;
    if(it.mode==='peso') value = Math.max(...it.doneSets.map(d=>d.w||0));
    else if(it.mode==='reps') value = Math.max(...it.doneSets.map(d=>d.r||0));
    else value = Math.max(...it.doneSets.map(d=>d.sec||0));
    const rpe = Math.max(0, ...it.doneSets.map(d=>d.rpe||0));
    // il PR migliore per questo esercizio in sessione
    let bestPr=null;
    for(const d of it.doneSets){ if(d.pr){ if(!bestPr || d.pr.value>bestPr.value) bestPr={...d.pr, nome:it.nome}; } }
    if(bestPr) prs.push(bestPr);
    return { id: it.id, n: i+1, nome: it.nome, unit, value, rpe, sets };
  });
  if(!items.length){
    if(confirm('Non hai registrato nessuna serie. Vuoi uscire senza salvare?')){ S.active=null; stopTimer(); S.view='allena'; saveState(); render(); }
    return;
  }
  const now = new Date();
  consolidateSessionClock();
  const durationSec = Math.round(sessionActiveMs()/1000);
  const session = {
    id: Date.now(),
    date: now.toISOString().slice(0,19),
    title: A.title || 'Sessione',
    routineId: A.routineId || null,
    kind: 'forza', status: 'completata',
    durationSec,
    items,
    source: 'app',
    cavci: null
  };
  session.volume = sessionVolume(session);
  S.sessions.push(session);
  // riepilogo di chiusura
  const totalSets = items.reduce((a,it)=>a+it.sets.length,0);
  // note raccolte in sessione (con esercizio)
  const notes = [];
  for(const it of items){ for(const st of it.sets||[]){ if(st.note) notes.push({ nome: it.nome, note: st.note }); } }
  const hasFatigue = notes.some(n=>FATIGUE_RE.test(n.note));
  // carattere della sessione: pr > breve > piena (senza mai colpevolizzare)
  let character = 'full';
  if(prs.length) character = 'pr';
  else if(durationSec < 12*60 || totalSets < 4) character = 'short';
  S.summary = { sessionId: session.id, title: session.title, date: session.date, volume: session.volume,
                durationSec, exercises: items.length, sets: totalSets, prs, notes, hasFatigue, character };
  S.active = null; stopTimer(); S.view='riepilogo'; saveState(); render(); window.scrollTo(0,0);
}

function saveSummaryNote(v){
  v = (v||'').trim();
  if(!v || !S.summary || !S.summary.sessionId) return;
  const s = S.sessions.find(x=>x.id===S.summary.sessionId);
  if(s) s.note = v.slice(0,140);
}

function saveBodyweight(){
  const val = S.weightInput != null ? S.weightInput : currentBodyweight();
  const today = new Date().toISOString().slice(0,10);
  S.measurements = (S.measurements||[]).filter(m=>String(m.date)!==today); // una misura per giorno (sovrascrive)
  S.measurements.push({ date: today, weight_kg: round1(val) });
  S.weightInput = null;
  saveState(); render();
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportBackup(){
  const payload = {
    _app: 'allenamento', _version: 1, _exported: new Date().toISOString(),
    sessions: S.sessions, measurements: S.measurements, config: S.config
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `allenamento-backup-${ts}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function importBackup(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try {
      const data = JSON.parse(reader.result);
      if(!data || !Array.isArray(data.sessions)) throw new Error('formato non valido');
      if(!confirm(`Importare ${data.sessions.length} sessioni? I dati attuali verranno sostituiti.`)) { ev.target.value=''; return; }
      S.sessions = data.sessions;
      if(Array.isArray(data.measurements)) S.measurements = data.measurements;
      if(data.config){
        S.config.barWeight = num(data.config.barWeight, S.config.barWeight);
        if(Array.isArray(data.config.plates) && data.config.plates.length) S.config.plates = data.config.plates.map(Number).filter(x=>x>0);
        S.config.step = num(data.config.step, S.config.step);
      }
      S.active = null;
      saveState(); S.view='storico'; render();
      alert('Backup importato.');
    } catch(e){
      alert('File non valido: ' + e.message);
    }
    ev.target.value='';
  };
  reader.onerror = ()=>{ alert('Errore lettura file.'); ev.target.value=''; };
  reader.readAsText(file);
}

// ============================================================
// UTIL
// ============================================================
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){
  try { const d=new Date(iso); if(isNaN(d)) return String(iso).slice(0,10);
    return d.toLocaleDateString('it-IT',{day:'numeric',month:'short',year:'numeric'}); } catch(e){ return String(iso); }
}
function fmtDur(sec){ sec=Math.round(sec||0); const m=Math.floor(sec/60), s=sec%60; return m>0 ? `${m}′${String(s).padStart(2,'0')}″` : `${s}″`; }

// ============================================================
// BOOT
// ============================================================
loadState();
render();
bindHoldListeners(); // listener long-press attaccati una sola volta a #app
bindDragListeners(); // listener drag riordino esercizi (una sola volta)
// tick del cronometro sessione (aggiorna solo il testo, nessun full render)
setInterval(()=>{
  if(S.view==='sessione' && S.active && !S.active.paused){
    const el=document.getElementById('sessionClock');
    if(el) el.textContent = fmtClock(sessionActiveMs());
  }
}, 1000);
